distributionBase=GRADLE_USER_HOME
distributionPath=wrapper/dists
# Sprint 30 — AGP 9.0 + Kotlin 2.0 paired migration. Attempted gradle
# 9.x bump (brief: "Bump gradle wrapper 8.11.1 → 9.x") but reverted to
# gradle-8.11.1 because:
#   (1) AGP 9.0.0 + AGP 9.0.x line publishes "Minimum supported Gradle
#       version is 9.1.0" via the version-check plugin;
#   (2) Gradle 9.0.0 downloadable; Gradle 9.1.0 NOT yet published as a
#       binary distribution at services.gradle.org (round 3 attempted,
#       returned FileNotFoundException at the canonical URL);
#   (3) Gradle 9.2.0+ not yet verified to exist either.
# Re-pin to 8.11.1 (Sprint 26/29 baseline) so the build remains green.
# AGP 9.x bump deferred to a future sprint when Gradle 9.1+ is published.
distributionUrl=https\://services.gradle.org/distributions/gradle-8.11.1-bin.zip
networkTimeout=10000
validateDistributionUrl=true
zipStoreBase=GRADLE_USER_HOME
zipStorePath=wrapper/dists
