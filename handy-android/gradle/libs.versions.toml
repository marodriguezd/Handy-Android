# Sprint 28b-v13: Compose UI test infra. The compose-* entries below
# are NOT explicitly versioned — they ride the compose-bom 2025.01.00 pin
# to hold them inside our Kotlin 1.9.24 + Compose 1.7.x + M3 1.3.1 baseline.
# Robolectric + test-ext / test-core get explicit catalog versions for
# reproducibility.
compose-ui-test-junit4 = { group = "androidx.compose.ui", name = "ui-test-junit4" }
compose-ui-test-manifest = { group = "androidx.compose.ui", name = "ui-test-manifest" }
robolectric = { group = "org.robolectric", name = "robolectric", version.ref = "robolectric" }
androidx-test-ext-junit = { group = "androidx.test.ext", name = "junit", version.ref = "androidx-test-ext" }
androidx-test-core = { group = "androidx.test", name = "core", version.ref = "androidx-test-core" }
# Sprint 29c — provides WindowInfoTracker, FoldingFeature,
# WindowMetricsCalculator. Used in MainActivity.kt via the
# `windowLayoutInfo(activity): Flow<WindowLayoutInfo>` API to drive
# fold-aware top-bar / bottom-bar padding in AppNavigation.kt.
androidx-window = { group = "androidx.window", name = "window", version.ref = "androidx-window" }

[plugins]
android-application = { id = "com.android.application", version.ref = "agp" }
kotlin-android = { id = "org.jetbrains.kotlin.android", version.ref = "kotlin" }
