name: "Android Release"

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.0.0-alpha2)"
        required: true
        default: "1.0.0-alpha2"

jobs:
  create-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      release-id: ${{ steps.create-release.outputs.result }}
      version: ${{ github.event.inputs.version }}

    steps:
      - uses: actions/checkout@v5

      - name: Create Draft Release
        id: create-release
        uses: actions/github-script@v9
        with:
          script: |
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: `v${{ github.event.inputs.version }}`,
              name: `v${{ github.event.inputs.version }}`,
              draft: true,
              prerelease: true,
              generate_release_notes: false
            })
            return data.id

  build-release:
    permissions:
      contents: write
    needs: create-release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          yes | sdkmanager "ndk;27.0.12077973" > /dev/null
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973" >> "$GITHUB_ENV"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, x86_64-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Decode keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > handy-android/handy-release.keystore
          else
            echo "Error: ANDROID_KEYSTORE_BASE64 secret is not set"
            exit 1
          fi

      - name: Build Rust + Android APK/AAB
        working-directory: ./handy-android
        run: |
          ./scripts/build-rust.sh
          ./gradlew assembleRelease -x buildRust bundleRelease -x buildRust --no-daemon
        env:
          HANDY_KEYSTORE_PATH: ../handy-release.keystore
          HANDY_KEYSTORE_PASSWORD: ${{ secrets.HANDY_KEYSTORE_PASSWORD }}
          HANDY_KEY_ALIAS: ${{ secrets.HANDY_KEY_ALIAS }}
          HANDY_KEY_PASSWORD: ${{ secrets.HANDY_KEY_PASSWORD }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}

      - name: Upload release assets
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const releaseId = ${{ needs.create-release.outputs.release-id }};
            const version = '${{ github.event.inputs.version }}';
            const apkPath = 'handy-android/app/build/outputs/apk/release/app-release.apk';
            const aabPath = 'handy-android/app/build/outputs/bundle/release/app-release.aab';

            async function uploadAsset(filePath) {
              const data = fs.readFileSync(filePath);
              const fileName = path.basename(filePath);

              await github.rest.repos.uploadReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: releaseId,
                name: `handy-android-v${version}-${fileName}`,
                data: data
              });
            }

            if (fs.existsSync(apkPath)) await uploadAsset(apkPath);
            if (fs.existsSync(aabPath)) await uploadAsset(aabPath);
