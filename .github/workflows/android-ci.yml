name: "Android CI"

on:
  push:
    branches: [main]
    paths:
      - "handy-android/**"
      - ".github/workflows/android-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "handy-android/**"
      - ".github/workflows/android-ci.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        build-type: [debug, release]

    steps:
      - uses: actions/checkout@v5

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          yes | sdkmanager "ndk;27.0.12077973" > /dev/null
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973" >> "$GITHUB_ENV"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./handy-android/handy-core -> target"
          key: android-${{ matrix.build-type }}

      - name: Decode keystore
        if: matrix.build-type == 'release'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > handy-android/handy-release.keystore
          fi

      - name: Build Rust native library
        working-directory: ./handy-android
        run: ./scripts/build-rust.sh
        if: matrix.build-type == 'release'

      - name: Build Android APK
        working-directory: ./handy-android
        run: |
          if [ "${{ matrix.build-type }}" = "release" ]; then
            ./gradlew assembleRelease -x buildRust --no-daemon
          else
            ./gradlew assembleDebug --no-daemon
          fi
        env:
          HANDY_KEYSTORE_PASSWORD: ${{ secrets.HANDY_KEYSTORE_PASSWORD || '' }}
          HANDY_KEY_ALIAS: ${{ secrets.HANDY_KEY_ALIAS || '' }}
          HANDY_KEY_PASSWORD: ${{ secrets.HANDY_KEY_PASSWORD || '' }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN || 'https://examplePublicKey@o0.ingest.sentry.io/0' }}

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v7
        with:
          name: handy-android-${{ matrix.build-type }}
          path: handy-android/app/build/outputs/apk/${{ matrix.build-type }}/app-${{ matrix.build-type }}.apk
          retention-days: 30
